version: '3.8'

services:
  stream:
    image: ghcr.io/dcronin05/stream:latest
    container_name: stream
    restart: unless-stopped
    ports:
      - "8002:8000"  # Web UI
      - "8003:8001"  # MCP SSE
    volumes:
      - ./data:/app/data
      - ./static:/app/static
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
